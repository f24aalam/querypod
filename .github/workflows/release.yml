name: Release Desktop Builds

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libsecret-1-dev

      - name: Resolve Dart packages
        run: flutter pub get

      - name: Analyze project
        run: flutter analyze

      - name: Run test suite
        run: flutter test

  build-linux:
    runs-on: ubuntu-22.04
    needs: validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libsecret-1-dev

      - name: Resolve Dart packages
        run: flutter pub get

      - name: Build Debian package
        run: RELEASE_VERSION="${GITHUB_REF_NAME#v}" ./scripts/build-linux-deb.sh

      - name: Stage Linux release artifact
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME#v}"
          cp "build/linux/deb/querypod_${VERSION}_amd64.deb" "dist/querypod-v${VERSION}-linux-x86_64.deb"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: dist/querypod-*.deb
          if-no-files-found: error

  build-windows:
    runs-on: windows-2022
    needs: validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve Dart packages
        run: flutter pub get

      - name: Build Windows runner
        run: flutter build windows --release

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}".Substring(1)
          $sourceDir = (Resolve-Path "build/windows/x64/runner/Release").Path
          $outputDir = Join-Path $PWD "dist"
          New-Item -ItemType Directory -Force -Path $outputDir | Out-Null
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=$version" `
            "/DMyAppSourceDir=$sourceDir" `
            "/DMyAppOutputDir=$outputDir" `
            "/DMyAppURL=${{ github.server_url }}/${{ github.repository }}" `
            "scripts/package-windows.iss"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: dist/querypod-*-windows-x86_64-setup.exe
          if-no-files-found: error

  build-macos:
    runs-on: macos-14
    needs: validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve Dart packages
        run: flutter pub get

      - name: Build macOS app
        run: flutter build macos --release

      - name: Package DMG
        run: |
          chmod +x scripts/package-macos.sh
          DIST_DIR="$PWD/dist" RELEASE_TAG="$GITHUB_REF_NAME" ./scripts/package-macos.sh

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: dist/querypod-*-macos-universal.dmg
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows
      - build-macos
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --title "$tag" --generate-notes
          gh release upload "$tag" dist/* --clobber
