name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: querypod_lab
          MYSQL_USER: querypod
          MYSQL_PASSWORD: querypod
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -prootpass --silent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=30
          --health-start-period=10s

      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: querypod
          POSTGRES_PASSWORD: querypod
          POSTGRES_DB: querypod_lab
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U querypod -d querypod_lab"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=30
          --health-start-period=10s

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libsecret-1-dev

      - name: Resolve Dart packages
        run: flutter pub get

      - name: Seed MySQL fixtures
        run: |
          for f in dev-db/mysql/init/*.sql; do
            mysql -h 127.0.0.1 -P 3306 -uroot -prootpass < "$f"
          done

      - name: Seed PostgreSQL fixtures
        env:
          PGPASSWORD: querypod
        run: |
          for f in dev-db/postgres/init/*.sql; do
            # We filter out the \connect command as we already specify the DB in the psql args
            grep -v "\\connect" "$f" | psql -h 127.0.0.1 -p 5432 -U querypod -d querypod_lab
          done

      - name: Run integration tests
        env:
          QUERYPOD_MYSQL_HOST: 127.0.0.1
          QUERYPOD_MYSQL_PORT: 3306
          QUERYPOD_MYSQL_USER: querypod
          QUERYPOD_MYSQL_PASSWORD: querypod
          QUERYPOD_MYSQL_DATABASE: querypod_lab
          QUERYPOD_PG_HOST: 127.0.0.1
          QUERYPOD_PG_PORT: 5432
          QUERYPOD_PG_USER: querypod
          QUERYPOD_PG_PASSWORD: querypod
          QUERYPOD_PG_DATABASE: querypod_lab
        run: |
          # Headless environment needs xvfb for desktop apps
          export DISPLAY=:99
          sudo Xvfb -ac :99 -screen 0 1280x1024x24 > /dev/null 2>&1 &
          
          flutter test -d linux integration_test
